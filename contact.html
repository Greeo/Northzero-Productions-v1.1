<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start a Project | Northzero Productions</title>
    <link rel="stylesheet" href="style.css?v=1.1">
    <style>
        /* CONTACT SPECIFIC STYLES */
        .contact-wrapper {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            min-height: 100vh;
            background: #050505;
            padding-top: 80px; /* Space for Nav */
        }

        /* Left Side: Brand Authority */
        .contact-info {
            padding: 100px 10%;
            border-right: 1px solid #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h1 {
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 15px;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        .contact-info p {
            color: #888;
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 60px;
            max-width: 450px;
        }

        .location-tag {
            color: var(--nz-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            margin-bottom: 10px;
        }

        /* Right Side: The Form */
        .contact-form-container {
            padding: 100px 10%;
            background: #080808;
            display: flex;
            align-items: center;
        }

        form { width: 100%; max-width: 600px; }

        .form-group { margin-bottom: 40px; position: relative; }

        label {
            display: block;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.65rem;
            color: var(--nz-gold);
            margin-bottom: 15px;
        }

        input, textarea, select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #222;
            padding: 15px 0;
            color: #fff;
            font-size: 1.1rem;
            font-family: var(--font-main);
            transition: 0.4s;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-bottom-color: var(--nz-gold);
        }

        select { cursor: pointer; color: #888; }
        select option { background: #0a0a0a; color: #fff; }

        .submit-btn {
            background: none;
            border: 1px solid var(--nz-gold);
            padding: 20px 50px;
            color: var(--nz-gold);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: var(--nz-gold);
            color: #000;
        }

        @media (max-width: 1024px) {
            .contact-wrapper { grid-template-columns: 1fr; }
            .contact-info { border-right: none; border-bottom: 1px solid #111; padding: 80px 50px; }
        }
    </style>
     <script async src="https://www.googletagmanager.com/gtag/js?id=G-7ZREPMHSWK">
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-7ZREPMHSWK');
    </script>
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
    <script src="https://assets.calendly.com/assets/external/widget.js" type="text/javascript" async></script>
</head>
<body>

    <nav></nav>

    <div class="contact-wrapper">
        <section class="contact-info">
            <p class="location-tag">New York / Hudson Valley</p>
            <h1>Initiate<br>Narrative</h1>
            <p>
                We collaborate with a limited number of clients per year to ensure each project receives the Northzero standard of structural and tactile integrity.
            </p>
            <div style="margin-top: auto;">
                <p style="font-size: 0.7rem; letter-spacing: 3px; color: #444;">&copy; 2026 Northzero Productions LLC</p>
            </div>
        </section>

        <section class="contact-form-container">
            <form id="my-form" action="https://formspree.io/f/xykedrkb" method="POST">
                <div class="form-group">
                    <label>Principal Name</label>
                    <input type="text" name="name" placeholder="E.g., Alexander Regan" required>
                </div>

                <div class="form-group">
                    <label>Digital Contact</label>
                    <input type="email" name="email" placeholder="email@address.com" required>
                </div>

                <div class="form-group">
                    <label>Project Classification</label>
                    <select name="service" required>
                        <option value="" disabled selected>Select a Service</option>
                        <option value="architectural">Architectural Cinema</option>
                        <option value="tactile">Tactile Narrative</option>
                        <option value="authority">The Authority Suite</option>
                        <option value="other">Bespoke Inquiry</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>The Objective</label>
                    <textarea name="message" rows="4" placeholder="Briefly describe the structural or visual goal..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Transmit Inquiry</button>
            </form>
        </section>
    </div>

    <script src="nav.js"></script>
</body>
</html>
