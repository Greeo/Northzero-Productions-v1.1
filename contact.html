<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Initiate Inquiry | Northzero Productions</title>
    
    <style>
        :root { --nz-gold: #d4af37; --nz-blue: #0047ab; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }

        /* --- STABILIZED NAV --- */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            z-index: 9999; background: #000; padding: 0 5%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #111;
        }

        .logo-link { display: flex; align-items: center; text-decoration: none; gap: 12px; }
        
        .compass-box {
            width: 38px; height: 38px; border: 1px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .needle {
            width: 2px; height: 26px;
            background: linear-gradient(to bottom, var(--nz-blue) 50%, var(--nz-gold) 50%);
            transition: transform 0.6s ease;
        }

        .logo-link:hover .needle { transform: rotate(45deg); }

        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .main-title { font-size: 1.1rem; font-weight: 900; letter-spacing: 3px; color: #fff; }
        .sub-title { font-size: 0.6rem; color: var(--nz-gold); letter-spacing: 4px; text-transform: uppercase; }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; }
        
        .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
        .hamburger span { width: 22px; height: 2px; background: #fff; }

        /* --- FORM CONTAINER --- */
        .contact-container {
            padding: 140px 5% 100px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .form-header { text-align: center; margin-bottom: 50px; }
        .form-header h1 { font-size: 2.2rem; letter-spacing: 8px; text-transform: uppercase; margin-top: 10px; }
        .form-header p { color: var(--nz-gold); letter-spacing: 3px; text-transform: uppercase; font-size: 0.7rem; }

        .nz-form {
            width: 100%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .full-width { grid-column: span 2; }

        label { color: #666; text-transform: uppercase; letter-spacing: 2px; font-size: 0.6rem; }
        input, select, textarea {
            background: #0a0a0a; border: 1px solid #222; padding: 15px;
            color: #fff; font-size: 1rem; width: 100%;
        }

        .submit-btn {
            grid-column: span 2; background: transparent; border: 1px solid var(--nz-gold);
            color: var(--nz-gold); padding: 20px; text-transform: uppercase;
            letter-spacing: 5px; cursor: pointer; transition: 0.4s;
        }

        .submit-btn:hover { background: var(--nz-gold); color: #000; }

        /* --- MOBILE REPAIRS --- */
        @media (max-width: 850px) {
            .nav-links { display: none; }
            .hamburger { display: flex; }
            .nz-form { display: flex; flex-direction: column; }
            .form-header h1 { font-size: 1.5rem; letter-spacing: 4px; }
            .main-title { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-link">
            <div class="compass-box"><div class="needle"></div></div>
            <div class="logo-text">
                <span class="main-title">NORTHZERO</span>
                <span class="sub-title">PRODUCTIONS</span>
            </div>
        </a>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
        <div class="nav-links" id="mobileMenu">
            <a href="index.html">Agency</a>
            <a href="work.html">Works</a>
            <a href="all-services.html">Services</a>
            <a href="about.html">Lens</a>
        </div>
    </nav>

    <main class="contact-container">
        <div class="form-header">
            <p>Project Intake</p>
            <h1>Initiate Inquiry</h1>
        </div>

        <form id="my-form" action="https://formspree.io/f/xykedrkb" method="POST" class="nz-form">
            <div class="form-group">
                <label>Principal Name</label>
                <input type="text" name="name" placeholder="Omar Greene" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="name@agency.com" required>
            </div>
            <div class="form-group full-width">
                <label>Historical Significance</label>
                <textarea name="significance" rows="4" placeholder="Describe the structural intent..."></textarea>
            </div>
            <button type="submit" class="submit-btn">Submit Audit</button>
        </form>
    </main>
    
    <script src="./nav.js"></script>
    <script>
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
            if(menu.style.display === 'flex') {
                menu.style.position = 'absolute';
                menu.style.top = '80px';
                menu.style.left = '0';
                menu.style.width = '100%';
                menu.style.background = '#000';
                menu.style.flexDirection = 'column';
                menu.style.padding = '20px';
            }
        }
    </script>
</body>
</html>
