<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Removed maximum-scale=1.0 and user-scalable=no — WCAG 1.4.4 violation -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate Inquiry | Northzero Productions</title>

    <link rel="stylesheet" href="style.css?v=2.2">

    <style>
        /* --- BRAND VARIABLES (fallback if not defined in style.css) --- */
        :root { --nz-gold: #d4af37; --nz-blue: #0047ab; --bg-black: #000; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow-x: hidden; }

        /* --- FORM CONTAINER --- */
        .contact-container {
            padding: 140px 5% 100px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .form-header { text-align: center; margin-bottom: 50px; }
        .form-header h1 { font-size: 2.2rem; letter-spacing: 8px; text-transform: uppercase; margin-top: 10px; }
        .form-header p  { color: var(--nz-gold); letter-spacing: 3px; text-transform: uppercase; font-size: 0.7rem; }

        .nz-form {
            width: 100%; max-width: 800px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 25px;
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .full-width  { grid-column: span 2; }

        label {
            color: #666; text-transform: uppercase;
            letter-spacing: 2px; font-size: 0.6rem;
        }

        input, select, textarea {
            background: #0a0a0a; border: 1px solid #222; padding: 15px;
            color: #fff; font-size: 1rem; width: 100%; font-family: inherit;
            /* Visible focus ring for keyboard users */
            outline: none; transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--nz-gold); }

        .submit-btn {
            grid-column: span 2; background: transparent;
            border: 1px solid var(--nz-gold); color: var(--nz-gold);
            padding: 20px; text-transform: uppercase; letter-spacing: 5px;
            cursor: pointer; transition: 0.4s; margin-top: 10px;
            font-family: inherit; font-size: 0.8rem;
        }
        .submit-btn:hover  { background: var(--nz-gold); color: #000; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #form-status {
            grid-column: span 2; text-align: center; margin-top: 10px;
            font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;
            min-height: 1.2em; /* prevents layout shift when message appears */
        }

        /* --- MOBILE --- */
        @media (max-width: 900px) {
            .nz-form       { display: flex; flex-direction: column; }
            .form-header h1 { font-size: 1.5rem; letter-spacing: 4px; }
        }
    </style>
</head>
<body>

    <!--
        Nav markup matches index.html, work.html, all-services.html, and about.html exactly.
        nav.js targets: #hamburger-menu and #nav-links-container.
    -->
    <nav class="nz-nav" role="navigation" aria-label="Main navigation">
        <a href="index.html" class="logo-link" aria-label="Northzero Productions — home">
            <div class="compass-box" aria-hidden="true"><div class="needle"></div></div>
            <div class="logo-text">
                <span class="main-title">NORTHZERO</span>
                <span class="sub-title">PRODUCTIONS</span>
            </div>
        </a>

        <button
            class="hamburger"
            id="hamburger-menu"
            aria-label="Toggle navigation menu"
            aria-expanded="false"
            aria-controls="nav-links-container"
        >
            <span></span><span></span><span></span>
        </button>

        <div class="nav-links" id="nav-links-container" role="menubar">
            <a href="index.html" role="menuitem">Agency</a>
            <a href="work.html" role="menuitem">Works</a>
            <div class="dropdown">
                <a href="all-services.html" class="dropbtn" role="menuitem">Services</a>
                <div class="dropdown-content">
                    <a href="authority.html">Authority Suite</a>
                    <a href="architectural.html">Architectural Cinema</a>
                    <a href="tactile.html">Tactile Narratives</a>
                </div>
            </div>
            <a href="about.html" role="menuitem">Lens</a>
            <a href="contact.html" role="menuitem" style="border: 1px solid var(--nz-gold); padding: 10px 20px; color: var(--nz-gold) !important;">Start Project</a>
        </div>
    </nav>

    <main class="contact-container">
        <div class="form-header">
            <p>Project Intake</p>
            <h1>Initiate Inquiry</h1>
        </div>

        <!--
            action attribute removed — endpoint lives only in JS to reduce bot exposure.
            All labels have for/id pairs for screen reader association (WCAG 1.3.1).
            autocomplete attributes added per WCAG 1.3.5.
        -->
        <form id="nz-contact-form" class="nz-form" novalidate>
            <div class="form-group">
                <label for="field-name">Principal Name</label>
                <input
                    type="text"
                    id="field-name"
                    name="name"
                    placeholder="Omar Greene"
                    autocomplete="name"
                    required
                >
            </div>
            <div class="form-group">
                <label for="field-email">Email</label>
                <input
                    type="email"
                    id="field-email"
                    name="email"
                    placeholder="name@agency.com"
                    autocomplete="email"
                    required
                >
            </div>
            <div class="form-group full-width">
                <label for="field-significance">Historical Significance</label>
                <textarea
                    id="field-significance"
                    name="significance"
                    rows="4"
                    placeholder="Describe the structural intent or legacy..."
                ></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submit-btn">Submit Audit</button>
            <p id="form-status" role="status" aria-live="polite"></p>
        </form>
    </main>

    <footer style="padding: 60px; text-align: center; border-top: 1px solid #111; color: #444; letter-spacing: 4px; text-transform: uppercase; font-size: 0.65rem;">
        &copy; 2026 Northzero Productions LLC | New York
    </footer>

    <script src="nav.js?v=1.1"></script>
    <script>
        // --- Hamburger (consistent with all other pages) ---
        const hamburger = document.getElementById('hamburger-menu');
        const navLinks  = document.getElementById('nav-links-container');

        hamburger.addEventListener('click', () => {
            const isOpen = navLinks.classList.toggle('active');
            hamburger.setAttribute('aria-expanded', isOpen);
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
            });
        });

        // --- Formspree AJAX Submission ---
        // Endpoint kept only in JS — removed from form action attribute
        const ENDPOINT = 'https://formspree.io/f/xykedrkb';

        const form   = document.getElementById('nz-contact-form');
        const status = document.getElementById('form-status');
        const btn    = document.getElementById('submit-btn');

        async function handleSubmit(e) {
            e.preventDefault();

            btn.disabled        = true;
            status.textContent  = 'Processing Audit...';
            status.style.color  = 'var(--nz-gold)';

            try {
                const res = await fetch(ENDPOINT, {
                    method:  'POST',
                    body:    new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (res.ok) {
                    status.textContent = 'Inquiry Received. We will contact you soon.';
                    status.style.color = '#fff';
                    form.reset();
                } else {
                    status.textContent = 'Submission Error. Please try direct email.';
                    status.style.color = '#e05555';
                }
            } catch {
                status.textContent = 'Connection Error. Please try again.';
                status.style.color = '#e05555';
            } finally {
                btn.disabled = false;
            }
        }

        form.addEventListener('submit', handleSubmit);
    </script>
</body>
</html>
