<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate Inquiry | Northzero Productions</title>
    <link rel="stylesheet" href="style.css?v=1.7">
    <style>
        /* 1. THE STACKED LOGO TEXT (Shared with Nav) */
        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
            justify-content: center;
        }
        
        .brand-northzero {
            color: #fff;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 1.1rem;
            font-weight: 900;
        }
        
        .brand-productions {
            color: #d4af37;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 400;
            margin-top: 2px;
        }

        /* 2. THE SPACER & CONTAINER */
        .header-spacer {
            height: 120px; /* Adjusted for cleaner look */
            width: 100%;
        }
    
        .contact-container {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 100px;
            box-sizing: border-box;
        }
            
        .nz-form {
            width: 90%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 0 auto;
        }

        .form-header { text-align: center; margin-bottom: 40px; }

        .form-header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            margin-top: 10px;
        }

        .form-group { display: flex; flex-direction: column; }
        .full-width { grid-column: span 2; }

        label {
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.65rem;
            margin-bottom: 10px;
        }

        input, select, textarea {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            transition: 0.3s;
            width: 100%;
            box-sizing: border-box;
        }

        /* 3. MOBILE NUCLEAR FIX (Centering & Hamburger) */
        @media screen and (max-width: 768px) {
            .header-spacer { height: 100px; }
            
            .nz-form {
                display: flex !important;
                flex-direction: column !important;
                gap: 20px;
            }

            .form-header h1 {
                font-size: 1.6rem;
                letter-spacing: 5px;
            }

            /* Force the nav links to hide so the hamburger can work */
            .nav-links { display: none; } 
            
            .brand-northzero { font-size: 1rem; }
            .brand-productions { font-size: 0.6rem; }
        }
    </style>
</head>
<body>
    
    <nav id="main-nav"></nav>
    
    <main class="contact-container">
        <div class="header-spacer"></div>
    
        <div class="form-header">
            <p>Project Intake</p>
            <h1>Initiate Inquiry</h1>
        </div>

        <p id="my-form-status" style="text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 20px; min-height: 20px;"></p>
    
        <form id="my-form" action="https://formspree.io/f/xykedrkb" method="POST" class="nz-form">
            <div class="form-group">
                <label>Legal Name / Principal</label>
                <input type="text" name="name" placeholder="Omar Greene" required>
            </div>
        
            <div class="form-group">
                <label>Professional Email</label>
                <input type="email" name="email" placeholder="name@agency.com" required>
            </div>
        
            <div class="form-group">
                <label>Service Category</label>
                <select name="category">
                    <option value="Architectural Cinema">Architectural Cinema</option>
                    <option value="Historic Preservation Audit">Historic Preservation Audit</option>
                    <option value="Tactile Narrative">Tactile Narrative / Commercial</option>
                    <option value="Institutional Branding">Institutional Branding</option>
                </select>
            </div>
        
            <div class="form-group">
                <label>Estimated Project Scale</label>
                <select name="budget">
                    <option value="5k-10k">Standard Portfolio ($5k - $10k)</option>
                    <option value="10k-25k">Premium Production ($10k - $25k)</option>
                    <option value="25k+">Institutional / Long-term Strategy ($25k+)</option>
                </select>
            </div>
        
            <div class="form-group full-width">
                <label>Historical or Structural Significance</label>
                <textarea name="significance" rows="4" placeholder="Briefly describe the design intent..."></textarea>
            </div>
        
            <div class="form-group full-width">
                <label>Project Timeline & Goals</label>
                <textarea name="goals" rows="2" placeholder="Primary objective..."></textarea>
            </div>
        
            <button type="submit" class="submit-btn" id="my-form-button">Submit for Audit</button>
        </form>
    </main>

    <script src="nav.js"></script>
    <script>
        var form = document.getElementById("my-form");
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("my-form-status");
          var data = new FormData(event.target);
          status.innerHTML = "PROCESSSING AUDIT...";
          status.style.color = "#d4af37";
          
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "INQUIRY RECEIVED. WE WILL CONTACT YOU SOON.";
              status.style.color = "#fff";
              form.reset();
            } else {
              status.innerHTML = "Oops! Problem submitting form";
              status.style.color = "red";
            }
          });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
