<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiate Inquiry | Northzero Productions</title>
    <link rel="stylesheet" href="style.css?v=1.7">
    <style>
        /* FORM-SPECIFIC DESIGN */
        .contact-container {
            padding: 150px 10%;
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .form-header {
            text-align: center;
            margin-bottom: 60px;
            max-width: 700px;
        }

        .form-header h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 10px;
            color: #fff;
            margin-bottom: 20px;
        }

        .form-header p {
            color: var(--nz-gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
        }

        .nz-form {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .full-width { grid-column: span 2; }

        label {
            color: #555;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.65rem;
            margin-bottom: 10px;
        }

        input, select, textarea {
            background: #0a0a0a;
            border: 1px solid #222;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--nz-gold);
            outline: none;
            background: #0d0d0d;
        }

        .submit-btn {
            grid-column: span 2;
            background: transparent;
            border: 1px solid var(--nz-gold);
            color: var(--nz-gold);
            padding: 20px;
            text-transform: uppercase;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.5s;
            margin-top: 20px;
        }

        .submit-btn:hover {
            background: var(--nz-gold);
            color: #000;
        }

        /* Mobile Fix */
        @media (max-width: 768px) {
            .nz-form { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .submit-btn { grid-column: span 1; }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7ZREPMHSWK">
    </script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-7ZREPMHSWK');
    </script>
</head>
<body>

    <nav></nav>
    <main>
        <p id="my-form-status" style="text-align: center; text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 20px; min-height: 20px;"></p>
    
        <form id="my-form" action="https://formspree.io/f/xykedrkb" method="POST" class="nz-form">
            
            <div class="form-group">
                <label>Legal Name / Principal</label>
                <input type="text" name="name" placeholder="Omar Greene" required>
            </div>
        
            <div class="form-group">
                <label>Professional Email</label>
                <input type="email" name="email" placeholder="name@agency.com" required>
            </div>
        
            <div class="form-group">
                <label>Service Category</label>
                <select name="category">
                    <option value="Architectural Cinema">Architectural Cinema</option>
                    <option value="Historic Preservation Audit">Historic Preservation Audit</option>
                    <option value="Tactile Narrative">Tactile Narrative / Commercial</option>
                    <option value="Institutional Branding">Institutional Branding</option>
                </select>
            </div>
        
            <div class="form-group">
                <label>Estimated Project Scale</label>
                <select name="budget">
                    <option value="5k-10k">Standard Portfolio ($5k - $10k)</option>
                    <option value="10k-25k">Premium Production ($10k - $25k)</option>
                    <option value="25k+">Institutional / Long-term Strategy ($25k+)</option>
                </select>
            </div>
        
            <div class="form-group full-width">
                <label>Historical or Structural Significance</label>
                <textarea name="significance" rows="4" placeholder="Briefly describe the design intent or historical importance..."></textarea>
            </div>
        
            <div class="form-group full-width">
                <label>Project Timeline & Goals</label>
                <textarea name="goals" rows="2" placeholder="What is the primary objective of this cinematic record?"></textarea>
            </div>
        
            <button type="submit" class="submit-btn" id="my-form-button">Submit for Audit</button>
        </form>
    </main>
    
    <script>
        var form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault();
          var status = document.getElementById("my-form-status");
          var data = new FormData(event.target);
          
          status.innerHTML = "PROCESSSING AUDIT...";
          status.style.color = "var(--nz-gold)";
    
          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: {
                'Accept': 'application/json'
            }
          }).then(response => {
            if (response.ok) {
              status.innerHTML = "INQUIRY RECEIVED. WE WILL CONTACT YOU SOON.";
              status.style.color = "#fff";
              form.reset();
            } else {
              response.json().then(data => {
                if (Object.hasOwn(data, 'errors')) {
                  status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                } else {
                  status.innerHTML = "Oops! There was a problem submitting your form";
                }
                status.style.color = "red";
              })
            }
          }).catch(error => {
            status.innerHTML = "Oops! There was a problem submitting your form";
            status.style.color = "red";
          });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
