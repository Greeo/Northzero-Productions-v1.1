<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selected Works | Northzero Productions</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --text-muted: #aaaaaa;
            --accent-color: #d4af37; /* Gold/Cinematic accent */
            --secondary-bg: #141414;
            --card-bg: #111;
            --font-main: 'Helvetica Neue', sans-serif;
            --nz-blue: #0047ab;
            --nz-gold: #d4af37;
            --nz-black: #0a0a0a;
            --nz-white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: var(--font-main); line-height: 1.8; overflow-x: hidden; }

        /* Navigation */
        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 50px;
            background: rgba(10, 10, 10, 0.95); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid #222;
        }
         
        /* --- UNIFIED NAVIGATION CSS --- */
        nav {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 50px; background: rgba(10, 10, 10, 0.95); 
            position: fixed; width: 100%; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            height: 80px;
        }
        
        /* Logo & Compass Needle */
        .logo-link { display: flex; align-items: center; text-decoration: none; transition: 0.3s; }
        .compass-box { width: 40px; height: 40px; border: 1.5px solid var(--nz-gold); border-radius: 50%; margin-right: 12px; display: flex; align-items: center; justify-content: center; }
        .needle { width: 2px; height: 26px; transform: rotate(-45deg); position: relative; }
        .needle::before { content: ''; position: absolute; top: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 13px solid var(--nz-blue); transform: translateX(-1.5px); }
        .needle::after { content: ''; position: absolute; bottom: 0; border-left: 3px solid transparent; border-right: 3px solid transparent; border-top: 13px solid var(--nz-gold); transform: translateX(-1.5px); }
        
        .logo-text { display: flex; flex-direction: column; text-transform: uppercase; line-height: 1; }
        .main-title { font-size: 1.3rem; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .sub-title { font-size: 0.55rem; color: var(--nz-gold); letter-spacing: 4px; }
        
        /* Desktop Links */
        .nav-links a { color: #fff; text-decoration: none; margin-left: 30px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        .nav-links a:hover { color: var(--nz-gold); }



        /* Dropdown Container */
        .dropdown {
            position: relative;
            display: inline-block;
        }
        
        /* Dropdown Content (Hidden by Default) */
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #0a0a0a;
            min-width: 220px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5);
            z-index: 1;
            border: 1px solid #222;
            margin-top: 10px;
        }
        
        /* Links inside the dropdown */
        .dropdown-content a {
            color: #888 !important;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.65rem !important;
            letter-spacing: 2px !important;
            margin: 0 !important;
            border-bottom: 1px solid #111;
            transition: 0.3s;
        }
        
        .dropdown-content a:hover {
            background-color: #111;
            color: var(--nz-gold) !important;
        }
        
        /* Show the dropdown on hover */
        .dropdown:hover .dropdown-content {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        
        /* The Unified Hamburger Icon */
        .hamburger-icon {
            display: none; cursor: pointer; flex-direction: column; gap: 6px; z-index: 1100;
        }
        .hamburger-icon span {
            width: 28px; height: 2px; background-color: #fff; transition: 0.4s;
        }
        
        /* Mobile Dropdown Menu */
        .mobile-dropdown {
            position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
            background: #0a0a0a; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 30px;
            transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1); z-index: 1050;
        }
        .mobile-dropdown.active { right: 0; }
        .mobile-dropdown a {
            color: #fff; text-decoration: none; font-size: 1.8rem;
            text-transform: uppercase; letter-spacing: 5px; font-weight: 200;
        }
        
        /* Reveal Hamburger on Mobile */
        @media (max-width: 900px) {
            .nav-links { display: none; }
            .hamburger-icon { display: flex; }
            nav { padding: 20px 30px; }
        }
        
        /* Hamburger Animation to 'X' */
        .hamburger-icon.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .hamburger-icon.open span:nth-child(2) { opacity: 0; }
        .hamburger-icon.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* Logo & Compass Styles */
        .logo-link { display: inline-flex; align-items: center; background: var(--nz-black); padding: 15px 25px; text-decoration: none; }
        .compass-box {
            position: relative; width: 50px; height: 50px; border: 2px solid #333; border-radius: 50%;
            margin-right: 20px; display: flex; align-items: center; justify-content: center; transition: 0.4s ease;
        }
        .needle {
            position: relative; width: 4px; height: 36px; transform: rotate(-45deg);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .needle::before {
            content: ''; position: absolute; top: 0; left: 0; width: 0; height: 0;
            border-left: 4px solid transparent; border-right: 4px solid transparent;
            border-bottom: 18px solid var(--nz-blue); transform: translateX(-2px);
        }
        .needle::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 0;
            border-left: 4px solid transparent; border-right: 4px solid transparent;
            border-top: 18px solid var(--nz-gold); transform: translateX(-2px);
        }

        .logo-text { display: flex; flex-direction: column; text-transform: uppercase; }
        .main-title {
            font-size: 1.8rem; font-weight: 900; color: var(--nz-white); letter-spacing: 3px; line-height: 1;
            background: linear-gradient(120deg, rgba(255,255,255,1) 40%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,1) 60%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s linear infinite;
        }
        .main-title span.blue-zero { color: var(--nz-blue); -webkit-text-fill-color: var(--nz-blue); }
        .sub-title { font-size: 0.75rem; font-weight: 300; color: var(--nz-gold); letter-spacing: 6.5px; margin-top: 4px; }
        
        .logo-link:hover .needle { transform: rotate(0deg); }
        .logo-link:hover .compass-box { border-color: var(--nz-gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.3); }

        .nav-links a { color: var(--text-color); text-decoration: none; margin-left: 25px; font-size: 0.9rem; text-transform: uppercase; transition: color 0.3s; -webkit-align-content: center; }
        .nav-links a:hover { color: var(--accent-color); }
        .cta-btn { border: 1px solid var(--accent-color); padding: 10px 25px; color: var(--accent-color); transition: all 0.3s; }
        .cta-btn:hover { background: var(--accent-color); color: var(--bg-color); }

        /* Header Section */
        .portfolio-header { padding: 160px 50px 40px; text-align: center; }
        .portfolio-header h1 { font-size: 3.5rem; text-transform: uppercase; letter-spacing: 15px; margin-bottom: 20px; }

        /* Filter System */
        .filter-container { text-align: center; margin-bottom: 60px; }
        .filter-btn { 
            background: none; border: none; color: #555; text-transform: uppercase; 
            letter-spacing: 3px; font-size: 0.7rem; margin: 0 20px; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover { color: var(--nz-gold); }

        /* --- THE BENTO GRID --- */
        .work-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 20vw;
            gap: 15px;
            padding: 0 15px 80px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .work-item {
            position: relative;
            background: #111;
            overflow: hidden;
            cursor: pointer;
        }

        /* Layout Variances for Luxury Feel */
        .work-item.featured { grid-column: span 4; grid-row: span 2; }
        .work-item.tall { grid-column: span 2; grid-row: span 2; }
        .work-item.wide { grid-column: span 3; grid-row: span 1; }
        .work-item.standard { grid-column: span 2; grid-row: span 1; }

        .work-item img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(0.5) brightness(0.6);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .work-item:hover img {
            filter: grayscale(0) brightness(1);
            transform: scale(1.02);
        }

        .work-info {
            position: absolute; bottom: 30px; left: 30px;
            opacity: 0; transform: translateY(20px);
            transition: 0.4s ease;
        }

        .work-item:hover .work-info { opacity: 1; transform: translateY(0); }
        .work-info h3 { text-transform: uppercase; letter-spacing: 3px; font-size: 1.2rem; color: #fff; margin-bottom: 5px; }
        .work-info p { font-size: 0.65rem; color: var(--nz-gold); text-transform: uppercase; letter-spacing: 2px; }

        /* --- THE LIGHTBOX (MODAL) --- */
        .lightbox {
            display: none; position: fixed; z-index: 2000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98); align-items: center; justify-content: center;
        }
        .lightbox-content {
            position: relative; width: 90%; max-width: 1200px;
            aspect-ratio: 16 / 9; border: 1px solid #222;
        }
        .close-lightbox {
            position: absolute; top: -50px; right: 0;
            color: var(--nz-gold); font-size: 2.5rem; cursor: pointer;
            transition: 0.3s; line-height: 1;
        }
        .close-lightbox:hover { color: #fff; transform: rotate(90deg); }

        footer { padding: 100px 50px; text-align: center; color: #333; letter-spacing: 4px; text-transform: uppercase; font-size: 0.7rem; border-top: 1px solid #111; }

        @media (max-width: 1024px) {
            .work-grid { grid-template-columns: repeat(4, 1fr); grid-auto-rows: 30vw; }
        }
        @media (max-width: 768px) {
            .work-grid { grid-template-columns: 1fr; grid-auto-rows: 56.25vw; }
            .work-item.featured, .work-item.tall, .work-item.wide { grid-column: span 1; grid-row: span 1; }
            .portfolio-header h1 { font-size: 2rem; letter-spacing: 8px; }
        }
    </style>
</head>
<body>

    <nav></nav>

    <section class="portfolio-header">
        <h1 data-text="Selected Works">Selected Works</h1>
    </section>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterGallery('all')">All</button>
        <button class="filter-btn" onclick="filterGallery('estate')">Estate</button>
        <button class="filter-btn" onclick="filterGallery('tactile')">Tactile</button>
        <button class="filter-btn" onclick="filterGallery('institutional')">Institutional</button>
    </div>

    <div class="work-grid" id="workGrid">
        </div>

    <div id="videoLightbox" class="lightbox" onclick="closeVideo(event)">
        <div class="lightbox-content">
            <span class="close-lightbox">&times;</span>
            <div id="videoPlayerFrame" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Northzero Productions LLC | New York
    </footer>

    <script src="nav.js"></script>

    <script>
        // Your Curated Video Data
        const projects = [
            { id: 'AVN2N2hopGk', title: 'The Modern Estate', category: 'estate', type: 'Architectural Cinema', layout: 'featured' },
            { id: 'FEfAZ5CTP84', title: 'Artificially Yours', category: 'tactile', type: 'Tactile Narrative', layout: 'tall' },
            { id: 'ONyk8VokO2k', title: 'Croc Fashion', category: 'tactile', type: 'Design & Texture', layout: 'standard' },
            { id: 'UV3Lvew15fs', title: 'Braising', category: 'tactile', type: 'Visual Rhythm', layout: 'standard' },
            { id: 'U_s0PDP123c', title: 'Global Tech', category: 'institutional', type: 'Institutional Strategy', layout: 'wide' }
        ];

        function renderGallery(filter = 'all') {
            const grid = document.getElementById('workGrid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? projects : projects.filter(p => p.category === filter);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="work-item ${p.layout}" onclick="openVideo('${p.id}')">
                        <img src="https://img.youtube.com/vi/${p.id}/maxresdefault.jpg" alt="${p.title}">
                        <div class="work-info">
                            <h3>${p.title}</h3>
                            <p>${p.type}</p>
                        </div>
                    </div>
                `;
            });
        }

        function filterGallery(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase().includes(cat)) btn.classList.add('active');
                if(cat === 'all' && btn.innerText === 'ALL') btn.classList.add('active');
            });
            renderGallery(cat);
        }

        // Lightbox Functions
        function openVideo(videoID) {
            const lightbox = document.getElementById('videoLightbox');
            const player = document.getElementById('videoPlayerFrame');
            
            player.innerHTML = `
                <iframe 
                    width="100%" height="100%" 
                    src="https://www.youtube.com/embed/${videoID}?autoplay=1&rel=0&modestbranding=1" 
                    frameborder="0" allow="autoplay; fullscreen" allowfullscreen>
                </iframe>`;
            
            lightbox.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeVideo(e) {
            if (e.target.id === 'videoLightbox' || e.target.className === 'close-lightbox') {
                const lightbox = document.getElementById('videoLightbox');
                document.getElementById('videoPlayerFrame').innerHTML = '';
                lightbox.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // Initialize
        renderGallery();
    </script>
    <script src="nav.js"></script>
</body>
</html>
