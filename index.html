<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northzero Productions | Architectural Cinema</title>
    <link rel="stylesheet" href="style.css?v=1.5">
    <style>
        /* CRITICAL ALIGNMENT LOCK */
        html, body { background: #000; margin: 0; padding: 0; overflow-x: hidden; color: #fff; }
        
        /* HERO SECTION */
        .hero-slider {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            overflow: hidden;
        }
        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }
        .slide.active { opacity: 1; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2; }
        .hero-content { z-index: 10; text-align: center; }

        /* BENTO GEOMETRY */
        .experience-wrapper { padding: 120px 8%; background: #000; }
        .bento-container {
            display: grid;
            grid-template-columns: 1.5fr 1fr; /* The Power Split */
            grid-template-rows: 350px 350px; /* Two stacked rows */
            gap: 25px;
            margin-top: 60px;
        }
        .bento-box { background: #0a0a0a; border: 1px solid #1a1a1a; position: relative; overflow: hidden; background-size: cover; background-position: center; }
        .bento-box.large { grid-row: span 2; } /* Left anchor */
    </style>
</head>
<body>

    <nav></nav>

    <main>
        <section class="hero-slider">
            <div class="hero-overlay"></div>
            
            <div class="slide active" style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2000');"></div>
            
            <div class="slide" style="background-image: url('https://images.unsplash.com/photo-1503387762-592dea58ef21?q=80&w=2000');"></div>
        
            <div class="hero-content">
                <p style="color: #d4af37; letter-spacing: 10px; text-transform: uppercase; font-size: 0.8rem;">Architectural Cinema</p>
                <h1 style="font-size: clamp(3rem, 10vw, 5rem); letter-spacing: 20px; text-transform: uppercase; margin: 0;">Northzero</h1>
            </div>
        </section>
        
        <section class="experience-wrapper">
            <p style="color: #d4af37; letter-spacing: 5px; text-transform: uppercase; font-size: 0.7rem;">Strategic Roots</p>
            <h2 style="font-size: 2.2rem; letter-spacing: 5px; text-transform: uppercase; margin: 20px 0;">Historic Preservation <br>& Structural Narrative</h2>
        
            <div class="bento-container">
                <div class="bento-box large" style="background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200'); background-size: cover;"></div>
                
                <div class="bento-box" style="background-image: url('https://images.unsplash.com/photo-1513584684374-8bdb7489feef?q=80&w=800'); background-size: cover;"></div>
                
                <div class="bento-box" style="background-image: url('https://images.unsplash.com/photo-1502005229762-cf1b2da7c5d6?q=80&w=800'); background-size: cover;"></div>
            </div>
        </section>
    </main>

    <footer style="padding: 100px; text-align: center; border-top: 1px solid #111; color: #333; text-transform: uppercase; letter-spacing: 5px; font-size: 0.7rem;">
        &copy; 2026 Northzero Productions LLC
    </footer>

    <script src="nav.js"></script>

    <script>
        const slides = document.querySelectorAll('.slide');
        let i = 0;
        if(slides.length > 0) {
            setInterval(() => {
                slides[i].classList.remove('active');
                i = (i + 1) % slides.length;
                slides[i].classList.add('active');
            }, 5000);
        }
    </script>
</body>
</html>
