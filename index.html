<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northzero Productions | Architectural Cinema</title>
    <link rel="stylesheet" href="style.css?v=1.4">
    <style>
        /* THE 'NO-LEAK' LOCK */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            color: #fff;
            overflow-x: hidden;
            font-family: sans-serif; /* Fallback */
        }

        /* LOGO SIZE FIX */
        .main-title {
            font-size: clamp(2rem, 8vw, 4.5rem);
            text-transform: uppercase;
            letter-spacing: 15px;
            z-index: 10;
            position: relative;
            pointer-events: none; /* Let clicks pass through to slider if needed */
        }

        /* HERO SLIDER RECOVERY */
        .hero-slider {
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #050505;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide.active { opacity: 1; }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        /* SECTION ALIGNMENT */
        section {
            width: 100%;
            position: relative;
            background: #000;
            box-sizing: border-box;
        }

        .content-block {
            padding: 120px 10%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .authority-tag {
            color: #d4af37; /* Gold */
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 0.7rem;
            margin-bottom: 20px;
        }

        /* --- BENTO GRID REFINEMENT --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 350px; /* Slightly taller for more impact */
            gap: 30px;
            margin-top: 60px;
            width: 100%;
        }
        
        .bento-item { 
            background: #0a0a0a; /* Deep charcoal/black */
            border: 1px solid #1a1a1a; /* Subtle border */
            position: relative; 
            overflow: hidden; 
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        
        .bento-item:hover {
            border-color: #d4af37; /* Gold glow on hover */
            transform: translateY(-5px);
        }
        
        /* Forces the "Large" box to span 2 columns and 2 rows */
        .bento-item.large { 
            grid-column: span 2; 
            grid-row: span 2; 
        }
        
        /* Mobile Fix: Stack the boxes on small screens */
        @media (max-width: 900px) {
            .bento-grid {
                grid-template-columns: 1fr;
                grid-auto-rows: 400px;
            }
            .bento-item.large {
                grid-column: span 1;
                grid-row: span 1;
            }
        }
        .bento-item { background: #111; border: 1px solid #222; position: relative; overflow: hidden; }
        .bento-item.large { grid-column: span 2; grid-row: span 2; }
    </style>
</head>
<body>

    <nav></nav>

    <main>
        <section class="hero-slider">
            <div class="hero-overlay"></div>
            
            <div class="slide active" style="background-image: url('hero1.jpg');"></div>
            <div class="slide" style="background-image: url('hero2.jpg');"></div>
            
            <div style="z-index: 5; text-align: center;">
                <span class="authority-tag">Architectural Cinema</span>
                <h1 class="main-title">Northzero</h1>
            </div>
        </section>

        <section class="content-block">
            <div class="authority-tag">Strategic Roots</div>
            <h2 style="font-size: 2rem; letter-spacing: 5px; text-transform: uppercase;">Historic Preservation <br>& Structural Narrative</h2>
            <p style="color: #888; line-height: 1.8; max-width: 600px; margin-top: 20px;">
                Leveraging my position on the Historic Preservation Commission to document the permanence and soul of New York's most significant estates.
            </p>

            <div class="bento-grid">
                <div class="bento-item large" style="background-image: url('regan-thumb.jpg'); background-size: cover;">
                    <div class="bento-overlay"></div> </div>
            
                <div class="bento-item" style="background-image: url('croc-thumb.jpg'); background-size: cover;"></div>
            
                <div class="bento-item" style="background-image: url('braising-thumb.jpg'); background-size: cover;"></div>
            </div>
        </section>

    </main>

    <footer style="padding: 80px; text-align: center; border-top: 1px solid #111; color: #444; letter-spacing: 4px; font-size: 0.7rem;">
        &copy; 2026 Northzero Productions LLC | New York
    </footer>

    <script src="nav.js"></script>
    
    <script>
        let slides = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
