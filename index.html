<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northzero Productions | Architectural Cinema</title>
    <link rel="stylesheet" href="style.css?v=1.3">
    <style>
       <style>
        /* 1. THE 'NO-LEAK' LOCK */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            color: #fff;
            overflow-x: hidden;
        }
    
        /* 2. LOGO SIZE FIX (Stops it from being huge) */
        .main-title {
            font-size: clamp(2.5rem, 8vw, 5rem); /* Caps the size */
            text-transform: uppercase;
            letter-spacing: 15px;
            margin: 0;
            line-height: 1.2;
            z-index: 10;
            position: relative;
        }
    
        /* 3. HERO IMAGE RESTORATION */
        .hero-index {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            
            /* Ensure your hero image is linked here or in style.css */
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                              url('YOUR_HERO_IMAGE.jpg'); 
            background-size: cover;
            background-position: center;
            position: relative;
        }
    
        /* 4. CONTENT RECOVERY */
        main {
            display: block;
            width: 100%;
        }
    
        .experience-section {
            background: #000;
            padding: 100px 5%;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            z-index: 5;
        }
    </style>
</head>
<body>

    <nav></nav>

    <main>
        
        <section class="hero-index">
            <span class="hero-tagline">Architectural Cinema</span>
            <h1 class="main-title">Northzero</h1>
        </section>

        <section class="experience-section">
            <div style="text-align: center; color: #444; letter-spacing: 5px; text-transform: uppercase; font-size: 0.6rem; margin-bottom: 50px;">
                Selected Works & Collaborations
            </div>
            
            <div class="bento-grid">
                </div>
        </section>

        <footer>
            &copy; 2026 Northzero Productions LLC | New York
        </footer>

    </main>
    
    <script src="nav.js"></script>
    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, 5000); 
    </script>
</body>
</html>
