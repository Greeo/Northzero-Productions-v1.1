<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Northzero Productions | Architectural Cinema</title>
    <link rel="stylesheet" href="style.css?v=1.3">
    <style>
        /* THE 'NO-LEAK' LOCK */
        html, body {
            background-color: #000 !important; /* Forces the browser to stay dark */
            margin: 0;
            padding: 0;
            color: #fff;
            overflow-x: hidden;
        }

        /* HERO TEXT FIXES */
        .hero-index {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #050505; /* Fallback */
            text-align: center;
        }

        .hero-tagline {
            color: var(--nz-gold);
            text-transform: uppercase;
            letter-spacing: 8px;
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
        }

        .main-title {
            font-size: clamp(3rem, 10vw, 6rem);
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 0;
            line-height: 1;
        }

        /* EXPERIENCE / FOOTER TRANSITION FIX */
        .experience-section {
            background: #000;
            padding: 120px 10%;
            border-top: 1px solid #111;
            width: 100%;
            box-sizing: border-box;
        }

        footer {
            background: #000;
            padding: 80px 20px;
            text-align: center;
            border-top: 1px solid #111;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            width: 100%;
        }
    </style>
</head>
<body>

    <nav></nav>

    <main>
        
        <section class="hero-index">
            <span class="hero-tagline">Architectural Cinema</span>
            <h1 class="main-title">Northzero</h1>
        </section>

        <section class="experience-section">
            <div style="text-align: center; color: #444; letter-spacing: 5px; text-transform: uppercase; font-size: 0.6rem; margin-bottom: 50px;">
                Selected Works & Collaborations
            </div>
            
            <div class="bento-grid">
                </div>
        </section>

        <footer>
            &copy; 2026 Northzero Productions LLC | New York
        </footer>

    </main>
    
    <script src="nav.js"></script>
    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, 5000); 
    </script>
</body>
</html>
